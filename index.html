<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>n0ise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;
  --ink:#f5f4ff;
  --muted:#8b8aa3;
  --dim:#5f5e78;
  --panel:#101019;
  --panel2:#171722;
  --line:#2a2a3b;
  --line2:#3a3a52;
  --green:#00ffaa;
  --blue:#58a6ff;
  --red:#ff3868;
  --yellow:#ffd84d;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg)}
body{
  margin:0;
  min-height:100svh;
  min-height:100dvh;
  overflow:hidden;
  background:var(--bg);
  color:var(--ink);
  font-family:"Barlow Condensed",system-ui,sans-serif;
}
button,input,select,textarea{font:inherit}
button{min-height:44px}
.app{
  height:100svh;
  height:100dvh;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  overflow:hidden;
}
.header{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:10px;
  min-height:calc(52px + var(--safe-top));
  padding:calc(6px + var(--safe-top)) 12px 6px;
  border-bottom:1px solid var(--line);
  background:rgba(6,6,8,.94);
  backdrop-filter:blur(18px);
  z-index:5;
}
.header > .file-btn{justify-self:start}
.logo{
  font-family:Arial, Helvetica, sans-serif;
  font-size:20px;
  font-weight:900;
  letter-spacing:.02em;
  text-shadow:-1px 0 var(--red),1px 0 var(--blue);
  justify-self:center;
}
.btn{
  border:1px solid rgba(245,244,255,.16);
  background:rgba(23,23,34,.82);
  color:var(--ink);
  border-radius:8px;
  padding:8px 12px;
  font-size:13px;
  font-weight:800;
  letter-spacing:.06em;
  cursor:pointer;
  touch-action:manipulation;
}
.btn:active{transform:scale(.97)}
.btn.primary{border-color:var(--green);color:var(--green)}
.btn.blue{border-color:var(--blue);color:var(--blue)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.38;cursor:not-allowed}
.file-btn{position:relative;overflow:hidden}
.file-btn input{position:absolute;inset:0;opacity:0;font-size:80px;cursor:pointer}
.header-actions{display:flex;gap:6px;justify-self:end}

.workspace{
  min-height:0;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:8px;
  padding:8px 12px 10px;
  overflow:hidden;
}
.ratio-wrap{width:min(92%,520px);justify-self:center;min-width:0}
.ratio-strip{
  display:flex;
  gap:7px;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  flex-wrap:nowrap;
  min-width:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(0,255,170,.45) transparent;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
  padding:0 0 3px;
  pointer-events:auto;
  justify-content:center;
}
.ratio-strip::-webkit-scrollbar,.fx-tray::-webkit-scrollbar,.toolbar::-webkit-scrollbar{height:3px}
.ratio-strip::-webkit-scrollbar-thumb,.fx-tray::-webkit-scrollbar-thumb,.toolbar::-webkit-scrollbar-thumb{background:rgba(0,255,170,.45);border-radius:99px}
.ratio-btn,.chip{
  flex:0 0 auto;
  min-height:36px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--muted);
  border-radius:8px;
  padding:6px 11px;
  font-family:"Space Mono",monospace;
  font-size:10px;
}
.ratio-btn.active,.chip.active{border-color:var(--green);color:var(--green)}
.stage-outer{
  min-height:0;
  display:grid;
  place-items:center;
  width:100%;
  height:100%;
  overflow:hidden;
  position:relative;
}
.stage{
  position:relative;
  display:grid;
  place-items:center;
  touch-action:none;
}
.stage.drop-ready #outputCanvas{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,255,170,.2),0 12px 70px rgba(0,0,0,.72)}
#outputCanvas{
  display:block;
  max-width:100%;
  max-height:100%;
  background:#090912;
  border:1px solid rgba(245,244,255,.12);
  box-shadow:0 12px 70px rgba(0,0,0,.72);
}
.empty-state{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  pointer-events:none;
}
.empty-card{
  width:min(100%,520px);
  height:min(100%,520px);
  min-height:260px;
  border:1px dashed rgba(245,244,255,.22);
  border-radius:0;
  background:rgba(9,9,18,.74);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-align:center;
  pointer-events:auto;
  box-shadow:inset 0 0 0 1px rgba(0,255,170,.04);
}
.empty-mark{
  width:72px;
  height:72px;
  border-radius:50%;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  color:var(--green);
  font-family:"Space Mono",monospace;
  font-size:26px;
  background:#0b0b12;
}
.empty-title{font-size:18px;font-weight:900;letter-spacing:.08em}
.empty-sub{max-width:210px;color:var(--muted);font-family:"Space Mono",monospace;font-size:11px;line-height:1.45}
.empty-actions{display:grid;grid-template-columns:1fr;gap:8px;width:210px}
.drag-hint{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  padding:5px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.72);
  color:var(--muted);
  font-family:"Space Mono",monospace;
  font-size:10px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.drag-hint.show{opacity:1}
.mode-hint{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  padding:5px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.68);
  color:var(--green);
  font-family:"Space Mono",monospace;
  font-size:10px;
  pointer-events:none;
  z-index:3;
}

.bottom{
  max-height:min(36svh,292px);
  max-height:min(36dvh,292px);
  min-height:184px;
  display:grid;
  grid-template-rows:minmax(0,1fr) auto;
  border-top:1px solid rgba(245,244,255,.12);
  border-radius:18px 18px 0 0;
  background:rgba(6,6,8,.94);
  backdrop-filter:blur(22px);
  padding-bottom:var(--safe-bottom);
  overflow:visible;
  z-index:4;
}
.drawer-backdrop{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.42);
  z-index:100;
}
.drawer-backdrop.show{display:block}
.tabs{display:none}
.tab{
  flex:1;
  min-height:44px;
  display:grid;
  place-items:center;
  color:var(--muted);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
  border-bottom:2px solid transparent;
  cursor:pointer;
}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.panel{display:none;min-height:0;overflow:visible}
.panel.active{display:flex;flex-direction:column}
#effectsPanel{display:flex;flex-direction:column;min-height:0;min-width:0;overflow:hidden}
#stackPanel,#layersPanel,#exportPanel{
  position:fixed;
  left:10px;
  right:10px;
  bottom:calc(10px + var(--safe-bottom));
  max-height:min(82dvh,720px);
  min-height:min(360px,70dvh);
  z-index:101;
  display:none;
  flex-direction:column;
  border:1px solid rgba(245,244,255,.16);
  border-radius:16px;
  background:#101019;
  box-shadow:0 24px 80px rgba(0,0,0,.64);
  overflow:hidden;
  pointer-events:auto;
}
#stackPanel.active,#layersPanel.active,#exportPanel.active{display:flex}
.drawer-head{
  flex:0 0 auto;
  position:sticky;
  top:0;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(245,244,255,.12);
  background:#101019;
}
#stackPanel .scroll-panel,#layersPanel .scroll-panel,#exportPanel .scroll-panel{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:6px 12px 8px;
  padding-bottom:18px;
}
.drawer-title{font-size:15px;font-weight:900;letter-spacing:.08em}
.drawer-actions{
  flex:0 0 auto;
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding:8px 12px;
  border-bottom:1px solid rgba(245,244,255,.08);
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
}
.drawer-actions .btn{flex:0 0 auto;font-size:11px;padding:6px 10px}
.fx-tray{
  display:flex;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  flex-wrap:nowrap;
  min-width:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(0,255,170,.48) transparent;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
  width:100%;
  max-width:100%;
  padding:9px 12px 7px;
  scroll-padding-inline:12px;
  flex:0 0 auto;
}
.tray-wrap{position:relative;min-width:0}
.scroll-arrow{display:none;position:absolute;top:10px;z-index:2;width:28px;min-height:46px;padding:0;border-radius:8px;background:rgba(16,16,25,.92)}
.scroll-arrow.left{left:8px}.scroll-arrow.right{right:8px}
@media (hover:hover) and (pointer:fine){.scroll-arrow{display:grid;place-items:center}}
@media (hover:hover) and (pointer:fine){.fx-tray{padding-left:42px;padding-right:42px}}
.fx-tile{
  flex:0 0 64px;
  min-height:50px;
  border:1px solid rgba(245,244,255,.11);
  background:rgba(16,16,25,.66);
  border-radius:8px;
  color:rgba(245,244,255,.46);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:3px;
  font-size:8px;
  font-weight:900;
  letter-spacing:.07em;
  cursor:pointer;
}
.fx-tile.active{border-color:var(--green);color:var(--green);background:rgba(0,255,170,.1);box-shadow:0 0 0 1px rgba(0,255,170,.18)}
.fx-icon{font-size:15px}
.scroll-panel{
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
  padding:6px 12px 8px;
}
.params{display:flex;flex-direction:column;gap:9px}
.more-btn{align-self:flex-start;min-height:34px;font-size:11px;padding:5px 10px}
.param-row{display:grid;grid-template-columns:68px minmax(0,1fr) 42px;gap:8px;align-items:center}
.param-label,.param-val,.mini-label{
  font-family:"Space Mono",monospace;
  font-size:10px;
  color:var(--muted);
}
.param-val{text-align:right;color:var(--ink)}
.mod-btn{display:none}
input[type=range]{
  width:100%;
  height:28px;
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
}
input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:3px;background:var(--line2)}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:22px;
  height:22px;
  margin-top:-9.5px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 12px rgba(0,255,170,.42);
}
input[type=range]::-moz-range-track{height:3px;border-radius:3px;background:var(--line2)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--green)}
.stack-list,.layer-list{display:flex;flex-direction:column;gap:7px;padding-bottom:24px}
.stack-row,.layer-row{
  display:grid;
  grid-template-columns:34px 1fr 58px 34px 34px;
  gap:7px;
  align-items:center;
  min-height:54px;
  padding:7px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--panel);
}
.layer-row{grid-template-columns:34px 38px minmax(0,1fr);grid-template-rows:auto auto auto;align-items:start}
.layer-controls{grid-column:1 / -1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.layer-controls select,.layer-controls input{width:100%;min-height:34px}
.layer-tools{grid-column:1 / -1;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.layer-tools .btn{min-height:34px;font-size:10px;padding:4px 8px;flex:0 0 auto}
.stack-row.active,.layer-row.active{border-color:var(--green)}
.icon-btn{
  min-height:34px;
  width:34px;
  padding:0;
  border-radius:8px;
  display:grid;
  place-items:center;
}
.row-title{font-size:13px;font-weight:900;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted)}
.thumb{width:38px;height:38px;border:1px solid var(--line);border-radius:7px;background:#090912;overflow:hidden}
.thumb canvas{width:100%;height:100%;object-fit:cover}
.toolbar{
  display:flex;
  gap:6px;
  padding:7px 12px 9px;
  border-top:1px solid rgba(245,244,255,.1);
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  flex-wrap:nowrap;
  min-width:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(0,255,170,.48) transparent;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
}
.toolbar .btn{flex:0 0 auto;white-space:nowrap;padding-left:10px;padding-right:10px}
#presetSaveBtn,#presetLoadBtn,#playBtn,#textBtn,.overlay-action{display:none}
#bakeBtn{display:none}
#recordBtn,#shareBtn,#exportSize,#videoScrub,#videoTime{display:none}
.quality-note{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted);line-height:1.4}
.segmented{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.segmented .btn{flex:1;min-width:72px;padding:6px 8px;font-size:11px}
.segmented .btn.active{border-color:var(--green);color:var(--green);background:rgba(0,255,170,.08)}
.solid-swatch{width:34px;height:34px;border:1px solid var(--line2);border-radius:8px;background:var(--swatch,#000)}
.hex-input{min-height:34px;border:1px solid var(--line2);border-radius:8px;background:var(--panel2);color:var(--ink);padding:6px;font-family:"Space Mono",monospace;font-size:11px;user-select:text;-webkit-user-select:text}
.guide-line{position:absolute;display:none;pointer-events:none;z-index:4;background:var(--green);box-shadow:0 0 10px rgba(0,255,170,.55)}
.guide-line.show{display:block}
.guide-line.v{top:0;bottom:0;width:1px;left:50%}
.guide-line.h{left:0;right:0;height:1px;top:50%}
.snap-hint{position:absolute;display:none;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;padding:5px 10px;border-radius:999px;background:rgba(0,0,0,.72);color:var(--green);font-family:"Space Mono",monospace;font-size:10px;pointer-events:none}
.snap-hint.show{display:block}
.sheet{
  position:fixed;
  inset:auto 10px calc(10px + var(--safe-bottom)) 10px;
  max-height:74svh;
  max-height:74dvh;
  display:none;
  flex-direction:column;
  gap:10px;
  padding:14px;
  border:1px solid var(--line2);
  border-radius:16px;
  background:#101019;
  z-index:110;
  box-shadow:0 24px 80px rgba(0,0,0,.62);
}
.sheet.show{display:flex}
.sheet h2{margin:0;font-size:18px;letter-spacing:.08em}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted)}
.text-input,select{
  min-height:42px;
  border:1px solid var(--line2);
  border-radius:8px;
  background:var(--panel2);
  color:var(--ink);
  padding:8px;
}
.text-input{width:100%;resize:vertical;user-select:text;-webkit-user-select:text}
.sheet-actions{display:flex;gap:8px}
.sheet-actions .btn{flex:1}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(min(42svh,330px) + 14px + var(--safe-bottom));
  transform:translateX(-50%) translateY(8px);
  opacity:0;
  transition:all .2s;
  pointer-events:none;
  z-index:120;
  padding:8px 14px;
  border-radius:999px;
  background:var(--green);
  color:#00120c;
  font-family:"Space Mono",monospace;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%)}
@media (max-height:700px){
  .bottom{max-height:min(36svh,270px);max-height:min(36dvh,270px);min-height:174px}
  .fx-tile{min-height:52px;flex-basis:68px}
}
@media (orientation:landscape) and (max-height:430px) and (max-width:950px){
  .app{grid-template-columns:74px minmax(0,1fr) minmax(250px,33vw);grid-template-rows:1fr}
  .header{grid-column:1;grid-row:1;flex-direction:column;padding:calc(8px + var(--safe-top)) 8px calc(8px + var(--safe-bottom))}
  .logo{writing-mode:vertical-rl;font-size:16px}
  .header-actions{flex-direction:column}
  .workspace{grid-column:2;grid-row:1;padding:8px}
  .bottom{grid-column:3;grid-row:1;max-height:none;height:100svh;height:100dvh;border-top:0;border-left:1px solid var(--line)}
  .toast{bottom:calc(12px + var(--safe-bottom))}
}
@media (max-width:680px){
  .header{min-height:calc(46px + var(--safe-top));gap:6px}
  .logo{font-size:17px;letter-spacing:.14em}
  .btn{font-size:11px;padding:7px 9px}
  .header-actions{gap:4px}
  .workspace{padding:6px 10px 8px;gap:6px}
  .ratio-wrap{width:100%}
  .ratio-strip{justify-content:flex-start}
  .bottom{max-height:min(42svh,330px);max-height:min(42dvh,330px)}
  #effectsPanel .scroll-panel{max-height:128px}
  #effectsPanel .params{display:grid;grid-template-columns:1fr 1fr;gap:7px;overflow:visible;padding-bottom:2px}
  #effectsPanel .param-row{grid-template-columns:52px minmax(0,1fr) 32px;gap:6px}
  #effectsPanel .param-label,#effectsPanel .param-val{font-size:9px}
  #stackPanel,
  #layersPanel,
  #exportPanel {
    left: 8px;
    right: 8px;
    bottom: calc(8px + var(--safe-bottom));
    max-height: 78dvh;
    min-height: 52dvh;
    border-radius: 18px;
  }
}
</style>
</head>
<body>
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="app">
  <header class="header">
    <label class="btn blue file-btn">IMPORT<input id="fileInput" type="file" accept="image/*,video/*"></label>
    <div class="logo">n0ise</div>
    <div class="header-actions">
      <button class="btn" id="undoBtn" title="Undo">UNDO</button>
      <button class="btn primary" id="exportPngBtn">EXPORT</button>
    </div>
  </header>

  <main class="workspace" id="workspace">
    <div class="ratio-wrap"><div class="ratio-strip" id="ratioStrip"></div></div>
    <section class="stage-outer">
      <div class="stage" id="stage">
        <canvas id="outputCanvas"></canvas>
        <div class="empty-state" id="emptyState">
          <div class="empty-card">
            <div class="empty-mark">N</div>
            <div class="empty-title">Drop or load artwork</div>
            <div class="empty-sub">Image / GIF / Video</div>
            <div class="empty-actions">
              <label class="btn primary file-btn">LOAD ARTWORK<input id="centerFileInput" type="file" accept="image/*,video/*"></label>
              <label class="btn blue file-btn">CAMERA<input id="cameraInput" type="file" accept="image/*" capture="environment"></label>
              <button class="btn ghost" id="pasteBtn">PASTE</button>
            </div>
          </div>
        </div>
        <div class="mode-hint" id="modeHint">Move layer</div>
        <div class="guide-line v" id="guideV"></div>
        <div class="guide-line h" id="guideH"></div>
        <div class="snap-hint" id="snapHint">CENTER</div>
        <div class="drag-hint" id="dragHint">drag stage to bend params</div>
      </div>
    </section>
  </main>

  <section class="bottom">
    <nav class="tabs">
      <div class="tab active" data-tab="effects">EFFECTS</div>
      <div class="tab" data-tab="stack">STACK <span id="stackCount">0</span></div>
      <div class="tab" data-tab="layers">LAYERS <span id="layerCount">0</span></div>
      <div class="tab" data-tab="export">EXPORT</div>
    </nav>

    <div class="panel active" id="effectsPanel">
      <div class="tray-wrap">
        <button class="btn scroll-arrow left" data-scroll-target="fxTray" data-scroll-dir="-1">&lt;</button>
        <div class="fx-tray" id="fxTray"></div>
        <button class="btn scroll-arrow right" data-scroll-target="fxTray" data-scroll-dir="1">&gt;</button>
      </div>
      <div class="scroll-panel"><div class="params" id="fxParams"></div></div>
    </div>

    <div class="toolbar">
      <button class="btn primary" id="addEffectBtn">COMMIT</button>

<script>

/* Effects */
const EFFECTS = {

  vhs:{label:"VHS",icon:"VH",params:{seed:r(1,999,77,1),noise:r(0,1,.35,.01),shift:r(0,60,18,1),bleed:r(0,34,14,1),roll:r(0,80,18,1),wobble:r(0,40,12,1),channels:r(0,1,1,1)}},

  crt:{label:"CRT",icon:"CRT",params:{curve:r(0,1,.22,.01),scan:r(0,1,.58,.01),mask:r(0,1,.32,.01),glow:r(0,1,.18,.01),channels:r(0,1,1,1)}},

  motion:{label:"MOTION",icon:"MS",params:{frames:r(2,12,5,1),decay:r(0,1,.58,.01),direction:r(0,360,0,1),distance:r(0,80,24,1)}},
  film:{label:"SUPER 8",icon:"S8",params:{seed:r(1,999,101,1),grain:r(0,1,.38,.01),burn:r(0,1,.42,.01),fade:r(0,1,.18,.01)}},
  sharpen:{label:"SHARPEN",icon:"SH",params:{amount:r(0,2,.85,.01)}},
  posterize:{label:"POSTER",icon:"PO",params:{levels:r(2,24,6,1),saturation:r(0,3,1.35,.01)}},
  edge:{label:"EDGE",icon:"ED",params:{amount:r(0,2,1,.01),mono:r(0,1,1,1)}},
  mirror:{label:"MIRROR",icon:"MR",params:{mode:r(0,2,0,1),tiles:r(1,8,2,1)}},
  badtv:{label:"BAD TV",icon:"BT",params:{seed:r(1,999,404,1),roll:r(0,120,36,1),tear:r(0,90,44,1),static:r(0,1,.48,.01),channels:r(0,1,1,1)}},
  scanDrift:{label:"DRIFT",icon:"SD",params:{seed:r(1,999,3,1),amount:r(0,70,25,1),speed:r(0,10,2,.01)}},
  echo:{label:"ECHO",icon:"FE",params:{frames:r(1,10,4,1),decay:r(0,1,.52,.01),freeze:r(0,1,0,1)}}
};
function r(min,max,value,step){return {min,max,value,step,label:""}}
Object.entries(EFFECTS).forEach(([key,fx])=>{
  if(key !== "none"){
    fx.params.mix = r(0,1,1,.01);
    fx.params.intensity = r(0,1,1,.01);
  }
  Object.entries(fx.params).forEach(([k,p])=>p.label = labelFor(k));
});
const PALETTES = [
  [[18,10,32],[0,255,170],[255,56,104]],
  [[6,6,8],[88,166,255],[245,244,255]],
  [[24,16,10],[255,216,77],[255,80,52]],
  [[9,16,28],[168,95,255],[35,255,210]],
  [[250,246,237],[28,32,42],[255,78,120]]
];

/* Media */
document.addEventListener("DOMContentLoaded", init);
function init(){
  "drawerBackdrop outputCanvas stage emptyState ratioStrip fxTray fxParams stackList layerList stackCount layerCount dragHint modeHint guideV guideH snapHint fileInput centerFileInput cameraInput pasteBtn undoBtn addEffectBtn bakeBtn randomBtn stackDrawerBtn layersDrawerBtn quickExportBtn presetSaveBtn presetLoadBtn playBtn textBtn overlayInput layerImageInput layerVideoInput addBlankLayerBtn addSolidLayerBtn solidColorInput openTextLayerBtn textSheet textValue textSize textSizeVal textColor textBlend closeText createText solidSheet solidEditColor solidEditHex closeSolid applySolid customRatioSheet customWInput customHInput customLockInput closeCustomRatio applyCustomRatio exportPngBtn exportFinalBtn exportFormatBtns exportSizeBtns qualityRow shareExportBtn exportSize videoScrub videoTime jpegQuality jpegQualityVal shareBtn recordBtn".split(" ").forEach(id=>els[id]=document.getElementById(id));
  els.ctx = els.outputCanvas.getContext("2d",{willReadFrequently:true});
  buildStaticUI();
  resetLayers();
  bindUI();
  updateExportUI();
  updateLayout();
  scheduleRender(true);
  if(isIOS) els.recordBtn.disabled = true;
}
function loadFile(file, asLayer=false){
  if(!file) return;
  const url = URL.createObjectURL(file);
  if(file.type.startsWith("video/")){
    const video = document.createElement("video");
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.crossOrigin = "anonymous";
    video.onloadedmetadata = ()=>{
      if(asLayer) addMediaLayer(video, video.videoWidth, video.videoHeight, "video");
      else setMainMedia({video, type:"video", w:video.videoWidth, h:video.videoHeight});
    };
    video.src = url;
  }else{
    const img = new Image();
    img.onload = ()=>{
      if(asLayer) addMediaLayer(img, img.naturalWidth, img.naturalHeight, "image");
      else setMainMedia({image:img, type:"image", w:img.naturalWidth, h:img.naturalHeight});
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }
}
function setMainMedia(media){
  saveUndo();
  state.image = media.image || null;
  state.video = media.video || null;
  state.mediaType = media.type;
  state.originalW = media.w;
  state.originalH = media.h;
  if(state.video) state.video.play().then(()=>state.playing=true).catch(()=>state.playing=false);
  else state.playing = false;
  els.videoScrub.disabled = media.type !== "video";
  els.videoScrub.value = 0;
  els.videoTime.textContent = "0:00";
  state.layers = [baseLayer()];
  state.activeLayer = 0;
  state.activeLayerId = state.layers[0].id;
  state.stack = [];
  state.activeStack = 0;
  state.activeStackId = null;
  state.liveEffect = null;
  state.mode = "transform";
  updateLayout();
  buildAll();
  scheduleRender(true);
  showToast(media.type === "video" ? "Video loaded" : "Artwork loaded");
}
async function pasteImage(){
  try{
    const items = await navigator.clipboard.read();
    for(const item of items){
      const type = item.types.find(t=>t.startsWith("image/"));
      if(type){ loadFile(await item.getType(type)); return; }
    }
    showToast("Clipboard has no image");
  }catch(e){ showToast("Paste unavailable here"); }
}

/* Layout */
function updateLayout(){
  const [cssW,cssH] = canvasCssSize();
  const dpr = Math.min(devicePixelRatio || 1, state.previewScale === 1 ? 2 : 1);
  setCanvasSize(els.outputCanvas, Math.max(1,Math.round(cssW*dpr)), Math.max(1,Math.round(cssH*dpr)), cssW, cssH);
  ensureCache(cache.comp, els.outputCanvas.width, els.outputCanvas.height);
  ensureCache(cache.tmp, els.outputCanvas.width, els.outputCanvas.height);
  ensureCache(cache.tmp2, els.outputCanvas.width, els.outputCanvas.height);
  state.dirty = true;
}
function canvasCssSize(){
  const box = document.querySelector(".stage-outer").getBoundingClientRect();
  const availableW = Math.max(160, box.width - 24);
  const availableH = Math.max(160, box.height - 24);
  const mobile = matchMedia("(max-width: 680px)").matches;
  const maxCanvasW = mobile ? availableW : Math.min(availableW, 720);
  const maxCanvasH = availableH;
  const [rw,rh] = currentRatioPair();
  const ar = rw/rh;
  let cw = maxCanvasW, ch = maxCanvasW/ar;
  if(ch > maxCanvasH){ ch = maxCanvasH; cw = maxCanvasH*ar; }
  return [Math.floor(cw), Math.floor(ch)];
}
function currentRatioPair(){
  return state.ratio === "CUSTOM" ? [state.customW,state.customH] : RATIOS[state.ratio];
}
function setCanvasSize(c,w,h,cssW,cssH){
  if(c.width !== w) c.width = w;
  if(c.height !== h) c.height = h;
  if(cssW){ c.style.width = cssW + "px"; c.style.height = cssH + "px"; }
}
function ensureCache(c,w,h){ if(c.width !== w) c.width = w; if(c.height !== h) c.height = h; return c; }

/* Rendering */
function scheduleRender(full=false){
  state.dirty = true;
  if(full) state.previewScale = 1;
  if(!state.raf) state.raf = requestAnimationFrame(renderLoop);
}
function renderLoop(now){
  state.raf = 0;
  if(state.playing || hasModulators()) state.dirty = true;
  updateVideoUI();
  if(state.dirty) render(now);
  if(state.playing || hasModulators()) state.raf = requestAnimationFrame(renderLoop);
}
function render(now=performance.now()){
  state.dirty = false;
  const w = els.outputCanvas.width, h = els.outputCanvas.height;
  const ctx = els.ctx;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#090912";
  ctx.fillRect(0,0,w,h);
  const target = cache.comp.getContext("2d",{willReadFrequently:true});
  target.clearRect(0,0,w,h);
  target.fillStyle = "#090912";
  target.fillRect(0,0,w,h);
  for(const layer of state.layers){
    if(!layer.visible) continue;
    const t = cache.tmp.getContext("2d",{willReadFrequently:true});
    t.clearRect(0,0,w,h);
    drawLayer(t, layer, w, h, now);
    target.save();
    target.globalAlpha = layer.opacity;
    target.globalCompositeOperation = blendOp(layer.blend);
    target.drawImage(cache.tmp,0,0);
    target.restore();
  }
  if(!state.effectsBypassed && !state.bypassHold){
    applyStackToCanvas(target, w, h, state.stack, now);
    if(state.liveEffect) applyStackToCanvas(target, w, h, [state.liveEffect], now);
  }
  ctx.drawImage(cache.comp,0,0);
  els.emptyState.style.display = state.mediaType ? "none" : "flex";
}
function drawLayer(ctx, layer, w, h, now){
  if(layer.kind === "base" || layer.kind === "image" || layer.kind === "video"){
    drawLayerTransformed(ctx, layer, w, h);
  }else if(layer.kind === "blank"){
    drawBlankLayer(ctx, layer, w, h);
  }else if(layer.kind === "text"){
    ctx.save();
    ctx.translate(w*layer.x, h*layer.y);
    ctx.rotate(layer.rotation);
    ctx.scale(layer.scale, layer.scale);
    ctx.fillStyle = layer.color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `900 ${layer.size}px "Barlow Condensed", system-ui`;
    layer.text.split("\n").forEach((line,i,arr)=>ctx.fillText(line,0,(i-(arr.length-1)/2)*layer.size*.9));
    ctx.restore();
  }
}
function updateBaseLayerFromMedia(){}
function drawLayerTransformed(ctx, layer, w, h){
  const media = layer.media || (layer.kind === "base" ? (state.video || state.image) : null);
  if(!media) return;
  const iw = layer.sourceW || media.videoWidth || media.naturalWidth || media.width;
  const ih = layer.sourceH || media.videoHeight || media.naturalHeight || media.height;
  if(!iw || !ih) return;
  const fit = layer.fit || "cover";
  const scale = fit === "contain" ? Math.min(w/iw,h/ih) : Math.max(w/iw,h/ih);
  const dw = iw * scale, dh = ih * scale;
  ctx.save();
  ctx.translate((layer.x ?? .5) * w, (layer.y ?? .5) * h);
  ctx.rotate(layer.rotation || 0);
  ctx.scale(layer.scale || 1, layer.scale || 1);
  ctx.drawImage(media, -dw/2, -dh/2, dw, dh);
  ctx.restore();
}
function drawBlankLayer(ctx, layer, w, h){
  if(layer.color === "transparent") return;
  ctx.save();
  ctx.translate((layer.x ?? .5) * w, (layer.y ?? .5) * h);
  ctx.rotate(layer.rotation || 0);
  ctx.scale(layer.scale || 1, layer.scale || 1);
  ctx.fillStyle = layer.color || "#000000";
  ctx.fillRect(-w/2, -h/2, w, h);
  ctx.restore();
}
function drawFitted(ctx, media, cw, ch, mode="cover"){
  if(!media) return;
  const iw = media.videoWidth || media.naturalWidth || media.width;
  const ih = media.videoHeight || media.naturalHeight || media.height;
  if(!iw || !ih) return;
  const scale = mode === "contain" ? Math.min(cw/iw,ch/ih) : Math.max(cw/iw,ch/ih);
  const w = iw*scale, h = ih*scale;
  ctx.drawImage(media,(cw-w)/2,(ch-h)/2,w,h);
}
function applyStackToCanvas(ctx,w,h,stack,now){
  for(const item of stack){
    if(!item.visible || item.key === "none") continue;
    const params = modulatedParams(item, now);
    applyEffect(ctx,w,h,item.key,params);
  }
}
function hasModulators(){ return false; }

/* Effects Engine */
function applyEffect(ctx,w,h,key,p){
  const mix = p.mix ?? 1;
  const intensity = p.intensity ?? 1;
  if(mix <= 0 || intensity <= 0) return;
  const img = ctx.getImageData(0,0,w,h);
  const original = new Uint8ClampedArray(img.data);
  const d = img.data;
  if(key === "dither" && p.blur > 0){
    const radius=Math.max(1,p.blur|0);
    const copy=new Uint8ClampedArray(original);
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      let rs=0,gs=0,bs=0,c=0;
      for(let yy=-radius;yy<=radius;yy+=radius) for(let xx=-radius;xx<=radius;xx+=radius){
        const sx=Math.max(0,Math.min(w-1,x+xx)), sy=Math.max(0,Math.min(h-1,y+yy)), si=(sy*w+sx)*4;
        rs+=copy[si]; gs+=copy[si+1]; bs+=copy[si+2]; c++;
      }
      const i=(y*w+x)*4; original[i]=rs/c; original[i+1]=gs/c; original[i+2]=bs/c;
    }
  }
  const get = (x,y,c)=>{
    x = Math.max(0,Math.min(w-1,x|0));
    y = Math.max(0,Math.min(h-1,y|0));
    return original[(y*w+x)*4+c];
  };
  const lumAt = i => .2126*original[i]+.7152*original[i+1]+.0722*original[i+2];
  const out = (i,r,g,b)=>{ d[i]=blend(original[i],r,mix); d[i+1]=blend(original[i+1],g,mix); d[i+2]=blend(original[i+2],b,mix); };
  const rng = seeded(p.seed || 1);
  const t = (performance.now() - state.startTime)/1000;

  if(key === "glitch"){
    for(let y=0;y<h;y++){
      const band = Math.floor(y/Math.max(1,p.block));
      let shift = Math.sin((band+p.seed)*3.91)*p.amount*intensity;
      if(rng() < .018*intensity) shift += (rng()-.5)*p.tear*4;
      for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const tear = Math.abs(x - w*((band*37)%101)/101) < p.tear ? p.tear*(rng()-.5) : 0;
        if(p.channels < .5){
          const l=.2126*get(x+shift+tear,y,0)+.7152*get(x+shift+tear,y,1)+.0722*get(x+shift+tear,y,2);
          out(i,l,l,l);
        }else out(i,get(x+shift+tear+(p.red??p.rgb),y,0),get(x+shift+tear+(p.green??0),y,1),get(x+shift+tear+(p.blue??-p.rgb),y,2));
      }
    }
  }else if(key === "vhs" || key === "badtv"){
    const amt = key === "badtv" ? p.tear : p.shift;
    for(let y=0;y<h;y++){
      const roll = Math.sin((y/h*8+t*(p.roll||1))*Math.PI*2)*(p.roll||0)*.2;
      const wob = Math.sin(y*.05+t*4)*(p.wobble||8);
      const jump = rng() < .012*intensity ? (rng()-.5)*amt*5 : 0;
      const shift = (roll+wob+jump)*intensity;
      for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const n=(rng()-.5)*255*(p.noise ?? p.static ?? .3)*intensity;
        const scan = y%4===0 ? .56 : 1;
        if(p.channels < .5){
          const l=.2126*get(x+shift,y,0)+.7152*get(x+shift,y,1)+.0722*get(x+shift,y,2)+n;
          out(i,cl(l*scan),cl(l*scan),cl(l*scan));
        }else out(i,cl(get(x+shift+(p.bleed||8),y,0)*scan+n),cl(get(x+shift,y,1)*scan+n),cl(get(x+shift-(p.bleed||8),y,2)*scan+n));
      }
    }
  }else if(key === "rgb"){
    const radial = Math.round(p.mode) === 1;
    const a = p.angle*Math.PI/180;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const nx=x-w/2, ny=y-h/2;
      const len = Math.hypot(nx,ny)/(Math.hypot(w,h)/2);
      const dx = radial ? nx*len*p.shift/w*4 : Math.cos(a)*p.shift;
      const dy = radial ? ny*len*p.shift/h*4 : Math.sin(a)*p.shift;
      if(p.channels < .5){
        const l=.2126*get(x+dx,y+dy,0)+.7152*get(x+dx,y+dy,1)+.0722*get(x+dx,y+dy,2);
        out(i,l,l,l);
      }else out(i,get(x+(p.red??dx),y+dy,0),get(x+(p.green??0),y,1),get(x+(p.blue??-dx),y-dy,2));
    }
  }else if(key === "pixelate"){
    const size=Math.max(1,p.size|0), levels=Math.max(2,p.colors|0);
    for(let y=0;y<h;y+=size) for(let x=0;x<w;x+=size){
      const sx=Math.min(w-1,x+(size/2|0)), sy=Math.min(h-1,y+(size/2|0)), si=(sy*w+sx)*4;
      const r=quant(original[si],levels), g=quant(original[si+1],levels), b=quant(original[si+2],levels);
      for(let yy=y;yy<Math.min(h,y+size);yy++) for(let xx=x;xx<Math.min(w,x+size);xx++){
        const i=(yy*w+xx)*4;
        const grid = (xx===x || yy===y) ? (1-p.grid) : 1;
        out(i,r*grid,g*grid,b*grid);
      }
    }
  }else if(key === "dither"){
    const bayer=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      let l=(lumAt(i)-128)*p.contrast+128;
      const style=Math.round(p.mode || 0);
      let th;
      if(style===0) th=bayer[(Math.floor(y/p.scale)%4)*4+Math.floor(x/p.scale)%4]/16*255;
      else if(style===1) th=rng()*255;
      else if(style===2) th=((x+y+Math.floor(x/Math.max(1,p.scale))) % (Math.max(2,p.scale)*2))/(Math.max(2,p.scale)*2)*255;
      else th=p.cutoff || 128;
      const v=quant(l>th?255:0,p.depth);
      out(i,v,v,v);
    }
  }else if(key === "halftone" || key === "ascii"){
    d.fill(0);
    for(let i=3;i<d.length;i+=4)d[i]=255;
    const cell=Math.max(3,(key==="ascii"?p.cell:p.size)|0);
    const a=(p.angle||0)*Math.PI/180, ca=Math.cos(a), sa=Math.sin(a);
    for(let cy=-cell;cy<h+cell;cy+=cell) for(let cx=-cell;cx<w+cell;cx+=cell){
      const rx=((cx-w/2)*ca-(cy-h/2)*sa+w/2)|0, ry=((cx-w/2)*sa+(cy-h/2)*ca+h/2)|0;
      let sum=0,count=0;
      for(let yy=0;yy<cell;yy+=2) for(let xx=0;xx<cell;xx+=2){ const px=rx+xx, py=ry+yy; if(px>=0&&py>=0&&px<w&&py<h){sum+=lumAt((py*w+px)*4);count++;}}
      const l=count ? sum/count/255 : 0;
      const radius = key==="ascii" ? Math.max(1,(p.invert?l:1-l)*cell*.47*p.contrast) : Math.max(1,l*cell*.5*p.contrast);
      for(let yy=0;yy<cell;yy++) for(let xx=0;xx<cell;xx++){
        const px=rx+xx, py=ry+yy;
        if(px<0||py<0||px>=w||py>=h) continue;
        const inside=Math.hypot(xx-cell/2,yy-cell/2)<radius;
        const i=(py*w+px)*4, v=inside?255:0;
        out(i,v,v,v);
      }
    }
  }else if(key === "moire"){
    const a=p.angle*Math.PI/180, ca=Math.cos(a), sa=Math.sin(a), radial=p.mode>.5;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4, nx=(x-w/2)/w, ny=(y-h/2)/h;
      const line = radial ? Math.sin(Math.hypot(nx,ny)*p.frequency*80) : Math.sin((nx*ca+ny*sa)*p.frequency*40);
      const m=1+line*p.strength*intensity;
      out(i,cl(original[i]*m),cl(original[i+1]*m),cl(original[i+2]*m));
    }
  }else if(key === "wave" || key === "lumaMesh" || key === "scanDrift"){
    const mode=Math.round(p.mode||0), a=(p.phase||p.angle||0)*Math.PI/180, dir=(p.angle||0)*Math.PI/180;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const l=(lumAt(i)/255-.5)*2;
      let ox=0, oy=0;
      if(key === "lumaMesh"){ ox=Math.cos(dir)*l*p.amount; oy=Math.sin(dir)*l*p.amount; }
      else if(key === "scanDrift"){ ox=Math.sin(y*.05+t*(p.speed||1)+rng())*p.amount*intensity; }
      else if(mode===0){ ox=Math.sin(y/h*p.frequency*Math.PI*2+a)*p.amount; }
      else if(mode===1){ oy=Math.sin(x/w*p.frequency*Math.PI*2+a)*p.amount; }
      else { const nx=x-w/2, ny=y-h/2, m=Math.sin(Math.hypot(nx,ny)/Math.max(w,h)*p.frequency*Math.PI*4+a)*p.amount; ox=nx/Math.max(1,Math.hypot(nx,ny))*m; oy=ny/Math.max(1,Math.hypot(nx,ny))*m; }
      out(i,get(x+ox,y+oy,0),get(x+ox,y+oy,1),get(x+ox,y+oy,2));
    }
  }else if(key === "threshold"){
    for(let i=0;i<d.length;i+=4){
      const l=lumAt(i), lo=p.cutoff-p.softness, hi=p.cutoff+p.softness;
      let v=smooth((l-lo)/(hi-lo+.001))*255;
      if(p.invert>.5) v=255-v;
      out(i,v,v,v);
    }
  }else if(key === "duotone" || key === "gradient"){
    const pal=PALETTES[Math.round(p.palette||0)%PALETTES.length];
    const [a,b,c]=pal;
    const ang=(p.angle||0)*Math.PI/180;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const tval = key === "gradient" ? Math.max(0,Math.min(1,((x/w-.5)*Math.cos(ang)+(y/h-.5)*Math.sin(ang)+.5)+(p.balance||0)*.25)) : lumAt(i)/255;
      const col = tval < .5 ? mixColor(a,b,tval*2) : mixColor(b,c,(tval-.5)*2);
      out(i,col[0],col[1],col[2]);
    }
  }else if(key === "datamosh" || key === "motion" || key === "echo"){
    const frames = p.frames || 4, decay = p.decay || p.feedback || .5, dist = p.distance || p.smear || 20, dir=(p.direction||0)*Math.PI/180;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      let r=original[i], g=original[i+1], b=original[i+2], weight=1;
      for(let k=1;k<=frames;k++){
        const off = (key==="datamosh" ? Math.sin((Math.floor(y/(p.blocks||20))+k+p.seed)*2.7)*dist : k*dist/frames)*intensity;
        const sx=x-Math.cos(dir)*off, sy=y-Math.sin(dir)*off;
        const ww=Math.pow(decay,k);
        r+=get(sx,sy,0)*ww; g+=get(sx,sy,1)*ww; b+=get(sx,sy,2)*ww; weight+=ww;
      }
      out(i,r/weight,g/weight,b/weight);
    }
  }else if(key === "pixelsort"){
    if(p.angle < .5){
      for(let y=0;y<h;y++) sortLine(y,0,w,1);
    }else{
      for(let x=0;x<w;x++) sortColumn(x);
    }
    function sortLine(y,start,end,step){
      for(let x=0;x<w;x+=Math.max(1,p.length|0)){
        const run=[];
        for(let xx=x;xx<Math.min(w,x+p.length);xx++){ const i=(y*w+xx)*4; if(lumAt(i)>p.threshold) run.push([original[i],original[i+1],original[i+2],lumAt(i)]); }
        run.sort((a,b)=>a[3]-b[3]);
        let k=0; for(let xx=x;xx<Math.min(w,x+p.length);xx++){ const i=(y*w+xx)*4; if(lumAt(i)>p.threshold && run[k]) out(i,run[k][0],run[k][1],run[k++][2]); }
      }
    }
    function sortColumn(x){
      for(let y=0;y<h;y+=Math.max(1,p.length|0)){
        const run=[];
        for(let yy=y;yy<Math.min(h,y+p.length);yy++){ const i=(yy*w+x)*4; if(lumAt(i)>p.threshold) run.push([original[i],original[i+1],original[i+2],lumAt(i)]); }
        run.sort((a,b)=>a[3]-b[3]);
        let k=0; for(let yy=y;yy<Math.min(h,y+p.length);yy++){ const i=(yy*w+x)*4; if(lumAt(i)>p.threshold && run[k]) out(i,run[k][0],run[k][1],run[k++][2]); }
      }
    }
  }else if(key === "crt"){
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4, nx=(x/w-.5)*2, ny=(y/h-.5)*2;
      const bx=x+nx*(nx*nx+ny*ny)*p.curve*40, by=y+ny*(nx*nx+ny*ny)*p.curve*40;
      const scan = 1 - (y%3===0 ? p.scan*.45 : 0);
      const mask = x%3===0 ? 1+p.mask : 1-p.mask*.28;
      if(p.channels < .5){
        const l=(get(bx,by,0)+get(bx,by,1)+get(bx,by,2))/3*scan;
        out(i,cl(l+p.glow*30),cl(l+p.glow*30),cl(l+p.glow*30));
      }else out(i,cl(get(bx,by,0)*scan*mask+p.glow*30),cl(get(bx,by,1)*scan),cl(get(bx,by,2)*scan*(2-mask)));
    }
  }else if(key === "kaleido"){
    const seg=Math.max(2,p.segments|0), spin=p.spin*Math.PI/180, zoom=p.zoom;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4, nx=x-w/2, ny=y-h/2, rad=Math.hypot(nx,ny)/zoom;
      let ang=Math.atan2(ny,nx)+spin;
      const slice=Math.PI*2/seg;
      ang=((ang%slice)+slice)%slice;
      if(ang>slice/2) ang=slice-ang;
      const sx=w/2+Math.cos(ang)*rad, sy=h/2+Math.sin(ang)*rad;
      out(i,get(sx,sy,0),get(sx,sy,1),get(sx,sy,2));
    }
  }else if(key === "film"){
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=(y*w+x)*4, n=(rng()-.5)*255*p.grain;
      const burn=Math.max(0,1-Math.hypot(x/w-.08,y/h-.12)*2)*p.burn*255;
      out(i,cl(original[i]*(1-p.fade)+burn+n),cl(original[i+1]*(1-p.fade*.5)+burn*.45+n),cl(original[i+2]*(1-p.fade*.2)+n));
    }
  }else if(key === "sharpen" || key === "edge"){
    for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
      const i=(y*w+x)*4;
      for(let c=0;c<3;c++){
        const v = key==="edge" ? Math.abs(get(x-1,y,c)-get(x+1,y,c))+Math.abs(get(x,y-1,c)-get(x,y+1,c)) : original[i+c]*(1+4*p.amount)-get(x-1,y,c)*p.amount-get(x+1,y,c)*p.amount-get(x,y-1,c)*p.amount-get(x,y+1,c)*p.amount;
        d[i+c]=blend(original[i+c],cl(v*(p.amount||1)),mix);
      }
      if(key==="edge" && p.mono>.5){ const l=(d[i]+d[i+1]+d[i+2])/3; d[i]=d[i+1]=d[i+2]=l; }
    }
  }else if(key === "posterize"){
    for(let i=0;i<d.length;i+=4){
      const rr=quant(original[i],p.levels), gg=quant(original[i+1],p.levels), bb=quant(original[i+2],p.levels);
      const l=.2126*rr+.7152*gg+.0722*bb;
      out(i,cl(l+(rr-l)*p.saturation),cl(l+(gg-l)*p.saturation),cl(l+(bb-l)*p.saturation));
    }
  }else if(key === "mirror"){
    const mode=Math.round(p.mode), tiles=Math.max(1,p.tiles|0);
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      let sx=x, sy=y;
      if(mode===0) sx = x < w/2 ? x : w-x-1;
      else if(mode===1) sy = y < h/2 ? y : h-y-1;
      else { sx = Math.abs(((x*tiles)%w)-w/2)*2; sy = Math.abs(((y*tiles)%h)-h/2)*2; }
      const i=(y*w+x)*4; out(i,get(sx,sy,0),get(sx,sy,1),get(sx,sy,2));
    }
  }
  ctx.putImageData(img,0,0);
}

/* Stack */
function addEffect(key=state.activeEffect){
  if(!state.liveEffect || key === "none"){ showToast("Pick an effect first"); return; }
  saveUndo();
  state.stack.push(JSON.parse(JSON.stringify(state.liveEffect)));
  state.activeStack = state.stack.length-1;
  state.activeStackId = state.stack[state.activeStack].id;
  state.liveEffect = null;
  state.mode = "transform";
  buildAll();
  scheduleRender(true);
  pulseDock();
  showToast("Committed");
}
function newStackItem(key){
  const params = {};
  Object.entries(EFFECTS[key].params).forEach(([k,p])=>params[k]=p.value);
  return {id:cryptoId(), key, visible:true, params};
}
function selectLiveEffect(key){
  state.activeEffect = key;
  state.effectsBypassed = false;
  state.showMore = false;
  state.liveEffect = key === "none" ? null : newStackItem(key);
  state.mode = state.liveEffect ? "effect" : "transform";
  if(state.liveEffect) randomizeItem(state.liveEffect, true);
  buildFxTray();
  buildParams();
  updateModeHint();
  centerActiveEffectTile();
  scheduleRender(true);
  showToast(state.liveEffect ? `${EFFECTS[key].label} preview` : "Move layer");
}
function duplicateStack(idx){
  saveUndo();
  const item = JSON.parse(JSON.stringify(state.stack[idx]));
  item.id = cryptoId();
  state.stack.splice(idx+1,0,item);
  state.activeStack = idx+1;
  state.activeStackId = item.id;
  buildAll();
  scheduleRender();
}
function removeStack(idx){
  saveUndo();
  state.stack.splice(idx,1);
  state.activeStack = Math.max(0,Math.min(state.activeStack,state.stack.length-1));
  state.activeStackId = state.stack[state.activeStack]?.id || null;
  buildAll();
  scheduleRender();
}
function moveStack(idx,dir){
  const ni=idx+dir;
  if(ni<0 || ni>=state.stack.length) return;
  saveUndo();
  [state.stack[idx],state.stack[ni]]=[state.stack[ni],state.stack[idx]];
  state.activeStack=ni;
  state.activeStackId = state.stack[ni].id;
  buildAll();
  scheduleRender();
}
function modulatedParams(item,now){ return item.params; }

/* Layers */
function resetLayers(){
  state.layers = [baseLayer()];
  state.activeLayer = 0;
  state.activeLayerId = state.layers[0].id;
  buildAll();
}
function baseLayer(){
  return makeLayer({
    kind:"base",
    name:"Artwork",
    media:state.video || state.image,
    mediaType:state.mediaType,
    sourceW:state.originalW || 1,
    sourceH:state.originalH || 1
  });
}
function makeLayer(overrides={}){
  return {
    id:cryptoId(),
    kind:"blank",
    name:"Layer",
    visible:true,
    opacity:1,
    blend:"normal",
    x:.5,
    y:.5,
    scale:1,
    rotation:0,
    fit:"cover",
    sourceW:overrides.sourceW || 1,
    sourceH:overrides.sourceH || 1,
    color:"transparent",
    effects:[],
    ...overrides
  };
}
function addMediaLayer(media,w,h,type){
  saveUndo();
  if(type === "video"){ media.play().catch(()=>{}); state.playing = true; }
  state.layers.push(makeLayer({kind:type, name:type === "video" ? "Video Layer" : "Image Layer", media, mediaType:type, sourceW:w, sourceH:h, opacity:.9, blend:"normal"}));
  state.activeLayer = state.layers.length-1;
  state.activeLayerId = state.layers[state.activeLayer].id;
  state.mode = "transform";
  state.liveEffect = null;
  buildAll();
  scheduleRender();
  showToast(type === "video" ? "Video layer added" : "Image layer added");
}
function addTextLayer(){
  saveUndo();
  state.layers.push(makeLayer({kind:"text", name:"Text", text:els.textValue.value || "NOISE", size:+els.textSize.value, color:els.textColor.value, blend:els.textBlend.value, sourceW:1, sourceH:1}));
  state.activeLayer = state.layers.length-1;
  state.activeLayerId = state.layers[state.activeLayer].id;
  state.mode = "transform";
  state.liveEffect = null;
  closeSheet();
  buildAll();
  scheduleRender();
}
function addBlankLayer(solid=false){
  saveUndo();
  const color=solid ? (normalizeHex(els.solidColorInput.value) || "#ffffff") : "transparent";
  state.layers.push(makeLayer({kind:"blank", name:solid ? "Solid Layer" : "Blank Layer", color, blend:solid ? "multiply" : "normal"}));
  state.activeLayer = state.layers.length-1;
  state.activeLayerId = state.layers[state.activeLayer].id;
  state.mode = "transform";
  state.liveEffect = null;
  buildAll();
  scheduleRender();
}
function deleteLayer(idx){
  if(state.layers.length <= 1){showToast("Keep one layer"); return}
  saveUndo();
  state.layers.splice(idx,1);
  state.activeLayer = Math.max(0,Math.min(state.activeLayer,state.layers.length-1));
  state.activeLayerId = state.layers[state.activeLayer].id;
  buildAll();
  scheduleRender();
}
function duplicateLayer(idx){
  saveUndo();
  const src = state.layers[idx];
  const copy = {...src, id:cryptoId(), name:src.name + " Copy"};
  state.layers.splice(idx+1,0,copy);
  state.activeLayer = idx+1;
  state.activeLayerId = copy.id;
  buildAll();
  scheduleRender();
}
function moveLayer(idx,dir){
  const ni = idx + dir;
  if(ni < 0 || ni >= state.layers.length) return;
  saveUndo();
  [state.layers[idx], state.layers[ni]] = [state.layers[ni], state.layers[idx]];
  state.activeLayer = ni;
  state.activeLayerId = state.layers[ni].id;
  buildAll();
  scheduleRender();
}
function resetLayerTransform(idx=state.activeLayer){
  const layer = state.layers[idx];
  if(!layer) return;
  saveUndo();
  Object.assign(layer,{x:.5,y:.5,scale:1,rotation:0});
  buildLayers();
  scheduleRender(true);
}

/* Gestures */
let drag = null;
const pointers = new Map();
function bindStageGestures(){
  els.stage.addEventListener("pointerdown",e=>{
    if(!state.mediaType || closestScrollable(e.target)) return;
    e.preventDefault();
    els.stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const item = state.liveEffect;
    const layer = state.layers[state.activeLayer];
    drag = {x:e.clientX,y:e.clientY,item:item && JSON.parse(JSON.stringify(item.params)),layer:{x:layer.x,y:layer.y,rotation:layer.rotation,scale:layer.scale},pinch:null};
    if(item){ state.previewScale = .55; updateLayout(); }
    els.dragHint.classList.add("show");
  });
  els.stage.addEventListener("pointermove",e=>{
    if(!drag) return;
    e.preventDefault();
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
    const layer=state.layers[state.activeLayer];
    if(state.liveEffect){
      const item=state.liveEffect;
      const keys=strongParamKeys(item.key);
      if(keys[0]) adjustByDrag(item,keys[0],dx,drag.item[keys[0]]);
      if(keys[1]) adjustByDrag(item,keys[1],-dy,drag.item[keys[1]]);
      updateParamControls(item);
    }else if(layer){
      const pts = [...pointers.values()];
      if(pts.length >= 2){
        state.bypassHold = true;
        const a=pts[0], b=pts[1];
        const dist=Math.hypot(a.x-b.x,a.y-b.y);
        const angle=Math.atan2(b.y-a.y,b.x-a.x);
        if(!drag.pinch) drag.pinch={dist,angle,scale:layer.scale || 1,rotation:layer.rotation || 0};
        layer.scale=Math.max(.08,Math.min(8,drag.pinch.scale * dist / Math.max(1,drag.pinch.dist)));
        layer.rotation=drag.pinch.rotation + (angle - drag.pinch.angle);
      }else{
      layer.x=Math.max(0,Math.min(1,drag.layer.x+dx/els.outputCanvas.clientWidth));
      layer.y=Math.max(0,Math.min(1,drag.layer.y+dy/els.outputCanvas.clientHeight));
      applySnap(layer,e.shiftKey);
      }
    }
    scheduleRender();
  });
  ["pointerup","pointercancel"].forEach(type=>els.stage.addEventListener(type,()=>{
    pointers.clear();
    state.bypassHold=false;
    hideGuides();
    if(!drag) return;
    drag=null;
    if(state.previewScale !== 1){ state.previewScale=1; updateLayout(); }
    els.dragHint.classList.remove("show");
    scheduleRender(true);
  }));
  els.stage.addEventListener("dblclick",e=>{
    if(closestScrollable(e.target)) return;
    resetLayerTransform();
  });
  els.stage.addEventListener("wheel",e=>{
    if(!e.altKey || state.liveEffect || e.target.closest("input,textarea,select")) return;
    const layer = state.layers[state.activeLayer];
    if(!layer) return;
    e.preventDefault();
    layer.scale = Math.max(.08,Math.min(8,(layer.scale || 1) * (e.deltaY < 0 ? 1.08 : .92)));
    scheduleRender(true);
  }, {passive:false});
}
function adjustByDrag(item,key,delta,start){
  const def=EFFECTS[item.key].params[key], range=def.max-def.min;
  item.params[key]=Math.max(def.min,Math.min(def.max,start + delta/300*range));
}
function applySnap(layer,disabled=false){
  hideGuides();
  if(disabled) return;
  const threshold=8;
  const cw=els.outputCanvas.clientWidth;
  const ch=els.outputCanvas.clientHeight;
  const tx=threshold/Math.max(1,cw);
  const ty=threshold/Math.max(1,ch);
  let label="";
  if(Math.abs(layer.x-.5)<tx){layer.x=.5; els.guideV.classList.add("show"); label="CENTER";}
  if(Math.abs(layer.y-.5)<ty){layer.y=.5; els.guideH.classList.add("show"); label="CENTER";}
  const b=layerBoundsNorm(layer);
  if(Math.abs(b.left)<tx){layer.x-=b.left; els.guideV.classList.add("show"); label="EDGE";}
  if(Math.abs(1-b.right)<tx){layer.x+=1-b.right; els.guideV.classList.add("show"); label="EDGE";}
  if(Math.abs(b.top)<ty){layer.y-=b.top; els.guideH.classList.add("show"); label="EDGE";}
  if(Math.abs(1-b.bottom)<ty){layer.y+=1-b.bottom; els.guideH.classList.add("show"); label="EDGE";}
  if(label){
    els.snapHint.textContent=label;
    els.snapHint.classList.add("show");
    const now=performance.now();
    if(label==="CENTER" && now-state.snapToastAt>900){
      state.snapToastAt=now;
      showToast("Layer centered");
    }
  }
}
function layerBoundsNorm(layer){
  const cw=els.outputCanvas.clientWidth, ch=els.outputCanvas.clientHeight;
  const media = layer.media || (layer.kind==="base" ? (state.video || state.image) : null);
  const iw=layer.sourceW || media?.naturalWidth || media?.videoWidth || cw;
  const ih=layer.sourceH || media?.naturalHeight || media?.videoHeight || ch;
  const fit=layer.fit || "cover";
  const s=fit==="contain" ? Math.min(cw/iw,ch/ih) : Math.max(cw/iw,ch/ih);
  const bw=(iw*s*(layer.scale||1))/cw;
  const bh=(ih*s*(layer.scale||1))/ch;
  return {left:layer.x-bw/2,right:layer.x+bw/2,top:layer.y-bh/2,bottom:layer.y+bh/2};
}
function hideGuides(){
  els.guideV.classList.remove("show");
  els.guideH.classList.remove("show");
  els.snapHint.classList.remove("show");
}
function closestScrollable(target){
  return target.closest && target.closest(".bottom,.toolbar,.ratio-strip,.sheet,input,select,textarea,button,label");
}

/* Export */
async function exportStill(type="image/png", share=false){
  type = type || state.exportFormat || "image/png";
  const {w,h} = exportDimensions();
  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = w;
  exportCanvas.height = h;
  try{
    renderComposition(exportCanvas, w, h, true, performance.now());
  }catch(err){
    showToast("Export too large");
    return;
  }
  const quality=+els.jpegQuality.value || .95;
  const blob=await new Promise(resolve=>exportCanvas.toBlob(resolve,type,type.includes("jpeg") ? quality : undefined));
  if(!blob){ showToast("Export failed"); return; }
  const ext=type.includes("jpeg")?"jpg":"png";
  const name=`noise-${Date.now()}.${ext}`;
  if(share && navigator.canShare){
    const file=new File([blob],name,{type});
    if(navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"NOISE export"}).catch(()=>{});
      return;
    }
  }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  showToast(ext.toUpperCase()+" exported");
}
function exportDimensions(){
  const visibleW = els.outputCanvas.width;
  const visibleH = els.outputCanvas.height;
  const ar = visibleW / Math.max(1, visibleH);
  if(state.exportSize === "preview") return {w:visibleW,h:visibleH};
  if(state.exportSize === "2x") return {w:Math.round(visibleW*2),h:Math.round(visibleH*2)};
  if(state.exportSize === "4k"){
    if(ar >= 1) return {w:3840,h:Math.round(3840/ar)};
    return {w:Math.round(3840*ar),h:3840};
  }
  if(state.ratio === "CUSTOM") return {w:state.customW,h:state.customH};
  if(state.originalW && state.originalH) return {w:state.originalW,h:state.originalH};
  return {w:visibleW,h:visibleH};
}
function renderComposition(canvas,w,h,includeEffects=true,now=performance.now()){
  const ctx = canvas.getContext("2d",{willReadFrequently:true});
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#090912";
  ctx.fillRect(0,0,w,h);
  const tmp=document.createElement("canvas");
  tmp.width=w; tmp.height=h;
  const tctx=tmp.getContext("2d",{willReadFrequently:true});
  for(const layer of state.layers){
    if(!layer.visible) continue;
    tctx.clearRect(0,0,w,h);
    drawLayer(tctx,layer,w,h,now);
    ctx.save();
    ctx.globalAlpha=layer.opacity;
    ctx.globalCompositeOperation=blendOp(layer.blend);
    ctx.drawImage(tmp,0,0);
    ctx.restore();
  }
  if(includeEffects && !state.effectsBypassed){
    applyStackToCanvas(ctx,w,h,state.stack,now);
    if(state.liveEffect) applyStackToCanvas(ctx,w,h,[state.liveEffect],now);
  }
}
function recordWebM(){
  if(isIOS || !els.outputCanvas.captureStream || !window.MediaRecorder){showToast("WebM unsupported here"); return}
  const stream=els.outputCanvas.captureStream(30);
  const rec=new MediaRecorder(stream,{mimeType:"video/webm"});
  const chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:"video/webm"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`noise-${Date.now()}.webm`;
    a.click();
  };
  rec.start();
  showToast("Recording 5s");
  setTimeout(()=>rec.stop(),5000);
}

      state.layers[hex].color=color;
      e.target.value=color;
      buildLayers();
      scheduleRender();
    }
  }
}
function layerChange(e){
  const idx=e.target.dataset.lblend;
  if(idx==null) return;
  state.layers[idx].blend=e.target.value;
  scheduleRender();
}
function replaceLayerMedia(e){
  const idx=e.target.dataset.lreplace;
  if(idx==null || !e.target.files?.[0]) return;
  const layer = state.layers[idx];
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);
  saveUndo();
  if(file.type.startsWith("video/")){
    const video=document.createElement("video");
    video.muted=true; video.loop=true; video.playsInline=true;
    video.onloadedmetadata=()=>{
      Object.assign(layer,{kind:"video",media:video,mediaType:"video",sourceW:video.videoWidth,sourceH:video.videoHeight,name:"Video Layer"});
      video.play().catch(()=>{});
      state.playing = true;
      buildLayers(); scheduleRender(true);
    };
    video.src=url;
  }else{
    const img=new Image();
    img.onload=()=>{
      Object.assign(layer,{kind:"image",media:img,mediaType:"image",sourceW:img.naturalWidth,sourceH:img.naturalHeight,name:"Image Layer"});
      URL.revokeObjectURL(url);
      buildLayers(); scheduleRender(true);
    };
    img.src=url;
  }
  e.target.value="";
}
function openSolidSheet(idx){
  const layer=state.layers[idx];
  if(!layer || layer.kind !== "blank" || layer.color === "transparent") return;
  state.solidEditLayer=idx;
  els.solidEditColor.value=normalizeHex(layer.color) || "#000000";
  els.solidEditHex.value=els.solidEditColor.value;
  els.solidSheet.classList.add("show");
}
function openCustomRatioSheet(){
  els.customWInput.value=state.customW;
  els.customHInput.value=state.customH;
  els.customRatioSheet.classList.add("show");
}
function applyCustomRatio(){
  state.customW=clampDim(+els.customWInput.value);
  state.customH=clampDim(+els.customHInput.value);
  state.ratio="CUSTOM";
  els.customRatioSheet.classList.remove("show");
  updateLayout();
  buildRatios();
  scheduleRender(true);
}
function clampDim(v){ return Math.max(128,Math.min(4096,Math.round(v||1080))); }
function applySolidEdit(){
  const idx=state.solidEditLayer;
  const color=normalizeHex(els.solidEditHex.value || els.solidEditColor.value);
  if(idx==null || !color) return;
  state.layers[idx].color=color;
  els.solidSheet.classList.remove("show");
  buildLayers();
  scheduleRender();
}
function applySolidLive(){
  const idx=state.solidEditLayer;
  const color=normalizeHex(els.solidEditColor.value);
  if(idx==null || !color) return;
  state.layers[idx].color=color;
  buildLayers();
  scheduleRender();
}
function bindHorizontalWheel(el){
  if(!el) return;
  el.addEventListener("wheel", e=>{
    if(e.target.closest("input,textarea,select")) return;
    if(el.scrollWidth <= el.clientWidth) return;
    const dominantVertical = Math.abs(e.deltaY) > Math.abs(e.deltaX);
    if(dominantVertical || e.shiftKey){
      e.preventDefault();
      el.scrollLeft += e.deltaY || e.deltaX;
    }
  }, {passive:false});
}
function bindDropImport(){
  ["dragenter","dragover"].forEach(type=>els.stage.addEventListener(type,e=>{
    e.preventDefault();
    els.stage.classList.add("drop-ready");
  }));
  ["dragleave","drop"].forEach(type=>els.stage.addEventListener(type,e=>{
    e.preventDefault();
    els.stage.classList.remove("drop-ready");
  }));
  els.stage.addEventListener("drop", e=>{
    const file = e.dataTransfer?.files?.[0];
    if(file) loadFile(file);
  });
}
function bindKeys(){
  document.addEventListener("keydown", e=>{
    const tag = document.activeElement?.tagName;
    if(["INPUT","TEXTAREA","SELECT"].includes(tag)) return;
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z"){ e.preventDefault(); undo(); return; }
    if(e.key === "Escape"){ e.preventDefault(); closeSheet(); return; }
    if(e.key === " "){ e.preventDefault(); state.effectsBypassed = true; scheduleRender(true); showToast("Before"); return; }
    if(e.key.toLowerCase() === "r"){ e.preventDefault(); randomizeCurrent(); return; }
    if(e.key === "Enter"){ e.preventDefault(); addEffect(state.activeEffect); }
  });
  document.addEventListener("keyup", e=>{
    if(e.key === " " && state.effectsBypassed){ e.preventDefault(); state.effectsBypassed=false; scheduleRender(true); showToast("After"); }
  });
}
function showDrawer(which){
  const panel = document.getElementById(which+"Panel");
  closeDrawers();
  panel.classList.add("active");
  els.drawerBackdrop.classList.add("show");
}
function closeDrawers(){
  document.querySelectorAll("#stackPanel,#layersPanel,#exportPanel").forEach(p=>p.classList.remove("active"));
  document.getElementById("effectsPanel").classList.add("active");
  els.drawerBackdrop.classList.remove("show");
}

/* Presets and Actions */
function savePreset(){
  localStorage.setItem("noisePreset",JSON.stringify(state.stack));
  showToast("Preset saved");
}
function loadPreset(){
  const raw=localStorage.getItem("noisePreset");
  if(!raw){showToast("No preset saved"); return}
  saveUndo();
  state.stack=JSON.parse(raw);
  state.activeStack=0;
  buildAll();
  scheduleRender(true);
  showToast("Preset loaded");
}
function randomizeCurrent(){
  if(!state.liveEffect && state.activeEffect !== "none") state.liveEffect = newStackItem(state.activeEffect);
  if(!state.liveEffect){ showToast("Pick an effect first"); return; }
  randomizeItem(state.liveEffect, true);
  buildAll();
  scheduleRender(true);
  pulseDock();
  showToast("Randomized");
}
function pulseDock(){
  document.querySelector(".bottom").animate([{filter:"brightness(1.35)"},{filter:"brightness(1)"}],{duration:180,easing:"ease-out"});
}
function randomizeItem(item, strong=false){
  if(!item) return;
  Object.entries(EFFECTS[item.key].params).forEach(([k,p])=>{
    if(k === "mix") item.params[k] = strong ? 1 : rand(.65,1);
    else if(k === "intensity") item.params[k] = strong ? rand(.82,1) : rand(.7,1);
    else if(k === "seed") item.params[k] = Math.floor(rand(1,999));
    else item.params[k] = strongRandomParam(item.key, k, p);
  });
}
function randomizeSeeds(){
  [...state.stack, state.liveEffect].filter(Boolean).forEach(item=>Object.keys(item.params).forEach(k=>{if(k==="seed") item.params[k]=Math.floor(rand(1,999));}));
}
function bakeStack(){
  if(!state.mediaType || (!state.stack.length && !state.liveEffect)){showToast("Nothing to bake");return}
  saveUndo();
  render(performance.now());
  const img=new Image();
  img.onload=()=>setMainMedia({image:img,type:"image",w:els.outputCanvas.width,h:els.outputCanvas.height});
  img.src=els.outputCanvas.toDataURL("image/png");
  showToast("Stack baked");
}
function togglePlay(){
  if(state.video){
    if(state.video.paused){state.video.play();state.playing=true}else{state.video.pause();state.playing=false}
  }else state.playing=!state.playing;
  els.playBtn.textContent=state.playing?"PAUSE":"PLAY";
  scheduleRender();
}
function updateVideoUI(){
  if(!state.video || !state.video.duration) return;
  const t=state.video.currentTime || 0;
  els.videoScrub.value = t / state.video.duration;
  els.videoTime.textContent = `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,"0")}`;
}
function defaultPreviewParam(effect,key,value){
  EFFECTS[effect].params[key].value=value;
}
function saveUndo(){
  const snap = {
    stack:JSON.parse(JSON.stringify(state.stack)),
    liveEffect:state.liveEffect ? JSON.parse(JSON.stringify(state.liveEffect)) : null,
    activeEffect:state.activeEffect,
    effectsBypassed:state.effectsBypassed,
    mode:state.mode,
    layers:state.layers.map(l=>{
      const copy = {...l, media:l.media};
      if(l.canvas){
        copy.canvas = document.createElement("canvas");
        copy.canvas.width = l.canvas.width;
        copy.canvas.height = l.canvas.height;
        copy.canvas.getContext("2d").drawImage(l.canvas,0,0);
      }
      return copy;
    }),
    activeLayer:state.activeLayer,
    activeLayerId:state.activeLayerId,
    activeStack:state.activeStack,
    activeStackId:state.activeStackId
  };
  state.undo.push(snap);
  if(state.undo.length > MAX_UNDO) state.undo.shift();
}
function undo(){
  const snap=state.undo.pop();
  if(!snap){showToast("Nothing to undo");return}
  state.stack=snap.stack;
  state.liveEffect=snap.liveEffect;
  state.activeEffect=snap.activeEffect;
  state.effectsBypassed=snap.effectsBypassed;
  state.mode=snap.mode;
  state.layers=snap.layers;
  state.activeLayer=snap.activeLayer;
  state.activeLayerId=snap.activeLayerId;
  state.activeStack=snap.activeStack;
  state.activeStackId=snap.activeStackId;
  buildAll();
  scheduleRender(true);
  showToast("Undone");
}
function closeSheet(){
  closeDrawers();
  els.textSheet.classList.remove("show");
  els.solidSheet.classList.remove("show");
  els.customRatioSheet.classList.remove("show");
}

/* Helpers */
function defaultParams(key){ const o={}; Object.entries(EFFECTS[key].params).forEach(([k,p])=>o[k]=p.value); return o; }
function blendOp(mode){ return mode === "normal" ? "source-over" : mode; }
function normalizeHex(value){
  const raw=String(value||"").trim();
  if(/^#[0-9a-fA-F]{6}$/.test(raw)) return raw.toLowerCase();
  if(/^[0-9a-fA-F]{6}$/.test(raw)) return "#"+raw.toLowerCase();
  if(/^#[0-9a-fA-F]{3}$/.test(raw)) return "#"+raw.slice(1).split("").map(ch=>ch+ch).join("").toLowerCase();
  return null;
}
function visibleParamKeys(key){
  const preferred = {
    glitch:["mix","intensity","amount","tear","seed","channels","red","green","blue"],
    vhs:["mix","intensity","noise","shift","seed","channels","bleed","roll"],
    rgb:["mix","intensity","shift","angle","channels","red","green","blue"],
    pixelate:["mix","intensity","size","colors","grid"],
    dither:["depth","scale","mode","contrast","cutoff","blur"],
    datamosh:["mix","intensity","seed","smear","feedback","blocks"],
    pixelsort:["mix","intensity","threshold","length","angle"],
    crt:["mix","intensity","curve","scan","channels","mask","glow"],
    kaleido:["mix","intensity","segments","spin","zoom"]
  };
  return (preferred[key] || ["mix","intensity",...Object.keys(EFFECTS[key].params).filter(k=>k!=="mix"&&k!=="intensity")]).filter(k=>EFFECTS[key].params[k]).slice(0,6);
}
function strongParamKeys(key){
  const map = {
    glitch:["amount","rgb"],
    vhs:["shift","noise"],
    rgb:["shift","angle"],
    pixelate:["size","colors"],
    dither:["scale","contrast"],
    datamosh:["smear","feedback"],
    pixelsort:["threshold","length"],
    crt:["curve","scan"],
    kaleido:["segments","spin"],
    halftone:["size","contrast"]
  };
  return map[key] || Object.keys(EFFECTS[key].params).filter(k=>!["mix","intensity","seed","mode"].includes(k));
}
function strongRandomParam(effect,key,p){
  const high = {
    glitch:{amount:[42,96],block:[8,34],rgb:[10,34],tear:[18,70]},
    vhs:{noise:[.18,.7],shift:[14,52],bleed:[8,30],roll:[16,70],wobble:[8,36]},
    rgb:{shift:[18,72],angle:[0,360],mode:[0,1]},
    pixelate:{size:[14,58],colors:[3,14],grid:[.2,.75]},
    dither:{mode:[0,2],scale:[2,9],contrast:[1.1,2.4],depth:[2,5]},
    datamosh:{smear:[28,84],feedback:[.28,.78],blocks:[8,38]},
    pixelsort:{threshold:[70,185],length:[34,140],angle:[0,1]},
    crt:{curve:[.12,.48],scan:[.45,.95],mask:[.22,.72],glow:[.12,.45]},
    kaleido:{segments:[4,12],spin:[0,360],zoom:[.65,1.4]}
  };
  const range = high[effect]?.[key];
  if(range){
    const v = range[0] + Math.random() * (range[1] - range[0]);
    return p.step === 1 ? Math.round(v) : v;
  }
  const v = p.min + Math.random() * (p.max - p.min);
  return p.step === 1 ? Math.round(v) : v;
}
function labelFor(k){ return ({hueA:"Hue A",hueB:"Hue B",rgb:"RGB",channels:"Channels",red:"Red",green:"Green",blue:"Blue",tear:"Tear",roll:"Roll",wobble:"Wobble",bleed:"Bleed",amount:"Amount",block:"Block",mix:"Mix",intensity:"Intensity",seed:"Seed",mode:"Style",shift:"Shift",angle:"Angle",size:"Size",colors:"Colors",grid:"Grid",scale:"Scale",contrast:"Contrast",depth:"Tones",frequency:"Freq",strength:"Strength",phase:"Phase",cutoff:"Threshold",blur:"Blur",softness:"Soft",invert:"Invert",palette:"Palette",balance:"Balance",smear:"Smear",feedback:"Feedback",blocks:"Blocks",threshold:"Thresh",length:"Length",curve:"Curve",scan:"Scan",mask:"Mask",glow:"Glow",cell:"Cell",segments:"Segments",spin:"Spin",zoom:"Zoom",frames:"Frames",decay:"Decay",direction:"Dir",distance:"Distance",grain:"Grain",burn:"Burn",fade:"Fade",levels:"Levels",saturation:"Sat",mono:"Mono",tiles:"Tiles",static:"Static",speed:"Speed",freeze:"Freeze"})[k] || k.toUpperCase(); }
function fmt(v){ const n=+v; return Math.abs(n)<10 && n%1 ? n.toFixed(2) : Math.round(n); }
function blend(a,b,t){ return cl(a+(b-a)*t); }
function cl(v){ return Math.max(0,Math.min(255,v))|0; }
function quant(v,levels){ return Math.round(Math.round(v/255*(levels-1))/(levels-1)*255); }
function smooth(t){ t=Math.max(0,Math.min(1,t)); return t*t*(3-2*t); }
function mixColor(a,b,t){ return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
function seeded(seed){ let s=(seed|0)||1; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function rand(a,b){ return a+Math.random()*(b-a); }
function cryptoId(){ return (globalThis.crypto?.randomUUID?.() || Math.random().toString(36).slice(2)); }
function debounce(fn,ms){ let id; return (...args)=>{clearTimeout(id); id=setTimeout(()=>fn(...args),ms)}; }
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1700);
}
</script>
